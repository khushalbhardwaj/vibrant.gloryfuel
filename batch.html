<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GloryFuel | Course Content</title>
    <link rel="icon" href="logo.jpg" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #03040a; color: #d6d3d1; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .bg-dots { background-image: radial-gradient(rgba(59, 130, 246, 0.15) 1px, transparent 1px); background-size: 30px 30px; }
        .glass-panel { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-item { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .animate-gradient-text { background-size: 200% auto; animation: gradientShift 4s linear infinite; }
        .glow-blue { filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.4)); }
        .scroll-blur { opacity: 0; filter: blur(12px); transform: translateY(40px); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), filter 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .scroll-blur.in-view { opacity: 1; filter: blur(0px); transform: translateY(0); }
        .hover-card { background: rgba(28, 25, 30, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hover-card:hover { transform: translateY(-8px); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 15px 35px -10px rgba(59, 130, 246, 0.2); background: rgba(20, 25, 35, 0.8); }
        .btn-click-effect:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton { background: #1c1917; background-image: linear-gradient(90deg, #1c1917 0px, #292524 40px, #1c1917 80px); background-size: 1000px 100%; animation: shimmer 2s infinite linear; }
        .pb-safe { padding-bottom: calc(85px + env(safe-area-inset-bottom)); }
        .tab-btn { transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen selection:bg-blue-500/30 relative flex flex-col overflow-x-hidden pb-safe md:pb-0">

    <div class="fixed inset-0 pointer-events-none bg-dots opacity-30 z-[-1]"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/15 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/15 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>

    <nav class="fixed top-0 w-full z-50 bg-[#03040a]/80 backdrop-blur-xl border-b border-blue-500/10 h-[70px] sm:h-20 transition-all duration-300 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer btn-click-effect transition-transform relative z-50">
                <button onclick="window.location.href='index.html'" class="text-stone-400 hover:text-white transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <img src="logo.jpg" alt="GloryFuel Logo" class="h-8 sm:h-10 w-auto drop-shadow-[0_0_10px_rgba(59,130,246,0.4)] rounded-full border border-blue-500/20" />
                <span class="text-lg sm:text-xl font-black tracking-tighter text-white">GLORY<span class="text-blue-500">FUEL</span></span>
            </div>
            <div class="items-center gap-2 bg-stone-900/50 p-1.5 rounded-2xl border border-white/5 shadow-inner hidden md:flex">
                <button onclick="window.location.href='index.html'" class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all btn-click-effect text-white bg-blue-600 flex items-center gap-1.5 lg:gap-2 uppercase tracking-widest shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                    <i data-lucide="layout-grid" class="w-3.5 h-3.5 lg:w-4 lg:h-4"></i> Batches
                </button>
                <button onclick="window.location.href='about.html'" class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all btn-click-effect text-stone-400 hover:text-white hover:bg-stone-800 flex items-center gap-1.5 lg:gap-2 uppercase tracking-widest">
                    <i data-lucide="user" class="w-3.5 h-3.5 lg:w-4 lg:h-4"></i> About
                </button>
                <button onclick="window.location.href='contact.html'" class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all btn-click-effect text-stone-400 hover:text-white hover:bg-stone-800 flex items-center gap-1.5 lg:gap-2 uppercase tracking-widest">
                    <i data-lucide="headset" class="w-3.5 h-3.5 lg:w-4 lg:h-4"></i> Support
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 pt-28 sm:pt-36 pb-10 sm:pb-20 px-4 sm:px-6 flex flex-col items-center max-w-[90rem] mx-auto w-full">

        <div class="w-full mb-4 flex items-center gap-1.5 text-[10px] text-stone-500 flex-wrap">
            <button onclick="window.location.href='index.html'" class="hover:text-blue-400 transition-colors">Batches</button>
            <span>/</span>
            <span class="text-white/70 font-semibold" id="breadcrumb">Course</span>
        </div>

        <div class="text-center mb-8 sm:mb-12 w-full animate-item" style="animation-delay: 0ms;">
            <div class="inline-flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-4 py-1.5 rounded-full text-blue-400 text-[9px] sm:text-[10px] font-black uppercase tracking-[0.2em] mb-3 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse" id="live-dot" style="display:none"></span>
                <span id="header-badge">Course Content</span>
            </div>
            <h1 class="text-2xl sm:text-4xl md:text-5xl font-black text-white mb-3 tracking-tight leading-tight" id="page-title">Loading...</h1>
        </div>

        <div class="flex gap-2 mb-6 flex-wrap justify-center">
            <button id="tab-content" class="tab-btn px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border transition-all btn-click-effect" style="background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3);color:#60a5fa" onclick="switchTab('content')">
                <i data-lucide="folder" class="w-3.5 h-3.5 inline mr-1"></i> Content
            </button>
            <button id="tab-live" class="tab-btn px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border border-stone-700 text-stone-400 hover:text-white transition-all btn-click-effect" onclick="switchTab('live')">
                <i data-lucide="radio" class="w-3.5 h-3.5 inline mr-1"></i> Live
            </button>
        </div>

        <div class="w-full max-w-3xl mx-auto mb-6">
            <div class="relative group">
                <div class="absolute inset-0 bg-blue-500/10 rounded-2xl blur-xl opacity-50"></div>
                <div class="relative bg-stone-900/80 backdrop-blur-xl border border-stone-700 rounded-2xl flex items-center p-2 shadow-xl">
                    <i data-lucide="search" class="w-4 h-4 text-stone-400 ml-3 shrink-0"></i>
                    <input id="search-input" type="text" placeholder="Search in this course..." class="w-full bg-transparent text-white px-3 py-2 sm:py-2.5 focus:outline-none text-xs sm:text-sm font-medium placeholder:text-stone-500">
                </div>
            </div>
        </div>

        <div class="w-full mx-auto" id="main-area">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="skeleton-grid">
                <div class="skeleton h-24 rounded-2xl"></div>
                <div class="skeleton h-24 rounded-2xl hidden sm:block"></div>
                <div class="skeleton h-24 rounded-2xl hidden lg:block"></div>
                <p id="skeleton-hint" class="hidden text-center text-[11px] text-amber-400/60 mt-4 col-span-full">Server warming up — retrying automatically every 5s...</p>
            </div>
            <div id="folders-area" class="hidden"></div>
            <div id="videos-area" class="hidden"></div>
            <div id="live-area" class="hidden"></div>
            <div id="error-area" class="hidden flex flex-col items-center justify-center py-20">
                <div class="w-16 h-16 bg-red-500/10 border border-red-500/20 rounded-2xl flex items-center justify-center mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-red-500"></i>
                </div>
                <p class="text-red-400 font-bold text-sm" id="error-msg">Failed to load.</p>
                <button onclick="location.reload()" class="mt-4 bg-stone-800 text-stone-300 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:text-white transition-colors border border-stone-700">Try Again</button>
            </div>
        </div>

    </main>

    <div class="md:hidden fixed bottom-0 left-0 w-full bg-[#03040a]/95 backdrop-blur-xl border-t border-stone-800 z-50 flex justify-between items-center px-2 py-3 pb-[calc(12px+env(safe-area-inset-bottom))] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] overflow-x-auto no-scrollbar">
        <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1.5 text-blue-500 w-[25%] btn-click-effect shrink-0">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
            <span class="text-[8px] font-black uppercase tracking-wider">Batches</span>
        </button>
        <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1.5 text-stone-500 w-[25%] btn-click-effect shrink-0">
            <i data-lucide="book-open" class="w-5 h-5"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">Courses</span>
        </button>
        <button onclick="window.location.href='about.html'" class="flex flex-col items-center gap-1.5 text-stone-500 hover:text-blue-400 transition-colors w-[25%] btn-click-effect shrink-0">
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">About</span>
        </button>
        <button onclick="window.location.href='contact.html'" class="flex flex-col items-center gap-1.5 text-stone-500 hover:text-blue-400 transition-colors w-[25%] btn-click-effect shrink-0">
            <i data-lucide="headset" class="w-5 h-5"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">Support</span>
        </button>
    </div>

    <script>
        lucide.createIcons();
        const API = typeof GLORYFUEL_API !== 'undefined' ? GLORYFUEL_API : "";
        const params = new URLSearchParams(location.search);
        const courseId = params.get('id');
        const courseTitle = params.get('title') || 'Course';
        let currentTab = 'content';
        let folderStack = [];
        let contentCache = {};
        let allItems = [];

        document.getElementById('page-title').textContent = courseTitle;
        document.getElementById('breadcrumb').textContent = courseTitle;
        document.title = 'GloryFuel | ' + courseTitle;

        if (!courseId) { showError('No course selected.'); }

        async function fetchItems(parentId, retries = 12) {
            const key = courseId + '-' + (parentId || '0');
            if (contentCache[key]) return contentCache[key];
            const url = parentId
                ? API + '/new-api/vibrant/course-hehe?course_id=' + courseId + '&parent_id=' + parentId
                : API + '/new-api/vibrant/course-hehe?course_id=' + courseId;
            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const r = await fetch(url);
                    const d = await r.json();
                    if (r.status === 429) {
                        document.getElementById('skeleton-hint').classList.remove('hidden');
                        const wait = (attempt + 1) * 5000;
                        await new Promise(r => setTimeout(r, wait));
                        continue;
                    }
                    if (d.status === 200 && d.data) {
                        contentCache[key] = d.data;
                        return d.data;
                    }
                    throw new Error(d.message || 'Fetch failed');
                } catch (e) {
                    if (attempt === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 5000));
                }
            }
            throw new Error('Fetch failed after retries');
        }

        window.playVideo = function(courseId, videoId, title) {
            window.location.href = 'player.html?course=' + courseId + '&video=' + videoId + '&title=' + encodeURIComponent(title);
        };

        function switchTab(tab) {
            currentTab = tab;
            const tc = document.getElementById('tab-content');
            const tl = document.getElementById('tab-live');
            if (tab === 'content') {
                tc.style.cssText = 'background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3);color:#60a5fa';
                tl.style.cssText = 'background:transparent;border-color:rgba(59,130,246,0.2);color:#9ca3af';
                renderContent();
            } else {
                tl.style.cssText = 'background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3);color:#60a5fa';
                tc.style.cssText = 'background:transparent;border-color:rgba(59,130,246,0.2);color:#9ca3af';
                fetchLive();
            }
        }

        async function renderContent() {
            document.getElementById('skeleton-grid').classList.remove('hidden');
            document.getElementById('folders-area').classList.add('hidden');
            document.getElementById('videos-area').classList.add('hidden');
            document.getElementById('live-area').classList.add('hidden');
            document.getElementById('error-area').classList.add('hidden');

            try {
                const parentId = folderStack.length > 0 ? folderStack[folderStack.length - 1] : null;
                const items = await fetchItems(parentId);
                document.getElementById('skeleton-grid').classList.add('hidden');

                const folders = items.filter(i => i.material_type === 'FOLDER');
                const videos = items.filter(i => i.material_type === 'VIDEO');
                const pdfs = items.filter(i => i.material_type === 'PDF');

                let html = '';

                if (folders.length > 0) {
                    html += '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-6">';
                    folders.forEach((f, i) => {
                        html += '<div class="scroll-blur hover-card rounded-2xl p-5 flex items-center gap-4 cursor-pointer group" style="transition-delay:'+(i*50)+'ms" onclick="openFolder(\''+f.id+'\',\''+f.Title.replace(/'/g,"\\'")+'\')">';
                        html += '<div class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center shrink-0"><i data-lucide="folder" class="w-6 h-6 text-blue-400"></i></div>';
                        html += '<div class="flex-1"><h4 class="text-sm font-bold text-stone-200 group-hover:text-white transition-colors">'+f.Title+'</h4><p class="text-[10px] text-stone-500 mt-0.5">'+ (f.videos_count || '0') +' videos</p></div>';
                        html += '<i data-lucide="chevron-right" class="w-4 h-4 text-stone-600"></i>';
                        html += '</div>';
                    });
                    html += '</div>';
                }

                const media = [...videos, ...pdfs];
                if (media.length > 0) {
                    html += '<div class="space-y-3">';
                    media.forEach((v, i) => {
                        const isVid = v.material_type === 'VIDEO';
                        html += '<div class="scroll-blur hover-card rounded-xl p-4 flex items-center gap-4" style="transition-delay:'+(i*30)+'ms">';
                        html += '<div class="w-10 h-10 rounded-lg '+(isVid?'bg-blue-500/20':'bg-red-500/20')+' flex items-center justify-center shrink-0"><i data-lucide="'+(isVid?'play-circle':'file-text')+'" class="w-5 h-5 '+(isVid?'text-blue-400':'text-red-400')+'"></i></div>';
                        html += '<div class="flex-1 min-w-0"><h4 class="text-sm font-semibold text-stone-200 truncate">'+v.Title+'</h4>';
                        if (v.duration) html += '<p class="text-[10px] text-stone-500 mt-0.5">'+v.duration+'</p>';
                        html += '</div>';
                        if (isVid) {
                            html += '<button onclick="event.stopPropagation();playVideo(\''+courseId+'\',\''+v.id+'\',\''+encodeURIComponent(v.Title)+'\')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 transition-all btn-click-effect shrink-0 shadow-[0_0_10px_rgba(37,99,235,0.3)]">Play</button>';
                        } else if (v.pdf_link) {
                            html += '<a href="'+v.pdf_link+'" target="_blank" class="bg-stone-800 text-stone-300 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:text-white transition-colors border border-stone-700 shrink-0">PDF</a>';
                        }
                        html += '</div>';
                    });
                    html += '</div>';
                }

                if (!html) html = '<p class="text-center text-stone-500 py-16 col-span-full">No content in this section.</p>';
                document.getElementById('folders-area').innerHTML = html;
                document.getElementById('folders-area').classList.remove('hidden');
                setTimeout(() => {
                    lucide.createIcons({ root: document.getElementById('folders-area') });
                    document.querySelectorAll('#folders-area .scroll-blur').forEach((el, i) => {
                        setTimeout(() => el.classList.add('in-view'), i * 60);
                    });
                }, 50);
            } catch (e) {
                document.getElementById('skeleton-grid').classList.add('hidden');
                showError(e.message);
            }
        }

        function openFolder(id, title) {
            folderStack.push(id);
            document.getElementById('breadcrumb').textContent += ' / ' + title;
            renderContent();
            window.scrollTo(0, 0);
        }

        async function fetchWithRetry(url, retries = 10) {
            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const r = await fetch(url);
                    if (r.status === 429) {
                        document.getElementById('skeleton-hint').classList.remove('hidden');
                        await new Promise(r => setTimeout(r, 5000));
                        continue;
                    }
                    return await r.json();
                } catch (e) {
                    if (attempt === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 5000));
                }
            }
        }

        async function fetchLive() {
            document.getElementById('skeleton-grid').classList.remove('hidden');
            document.getElementById('folders-area').classList.add('hidden');
            document.getElementById('videos-area').classList.add('hidden');
            document.getElementById('live-area').classList.add('hidden');
            document.getElementById('error-area').classList.add('hidden');

            try {
                const d = await fetchWithRetry(API + '/new-api/vibrant/live?course_id=' + courseId);
                document.getElementById('skeleton-grid').classList.add('hidden');

                let html = '';
                if (d.status === 200 && d.data) {
                    const live = d.data.live || [];
                    const upcoming = d.data.upcoming || [];

                    if (live.length > 0) {
                        html += '<h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2"><span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> Live Now</h3>';
                        live.forEach(s => {
                            html += '<div class="hover-card rounded-xl p-4 mb-3 flex items-center gap-4"><div class="flex-1 min-w-0"><h4 class="text-sm font-semibold text-white truncate">'+(s.Title||'Live Session')+'</h4></div></div>';
                        });
                    }
                    if (upcoming.length > 0) {
                        html += '<h3 class="text-sm font-bold text-white mb-4 mt-6">Upcoming Sessions</h3>';
                        upcoming.forEach(s => {
                            html += '<div class="hover-card rounded-xl p-4 mb-3 flex items-center gap-4"><div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center shrink-0"><i data-lucide="clock" class="w-5 h-5 text-blue-400"></i></div><div class="flex-1 min-w-0"><h4 class="text-sm font-semibold text-white truncate">'+(s.Title||'Session')+'</h4>'+(s.date_and_time?'<p class="text-[10px] text-stone-500 mt-0.5">'+s.date_and_time+'</p>':'')+'</div></div>';
                        });
                    }
                }
                if (!html) html = '<p class="text-center text-stone-500 py-16">No live or upcoming sessions.</p>';
                document.getElementById('live-area').innerHTML = html;
                document.getElementById('live-area').classList.remove('hidden');
                setTimeout(() => lucide.createIcons({ root: document.getElementById('live-area') }), 50);
            } catch (e) {
                document.getElementById('skeleton-grid').classList.add('hidden');
                document.getElementById('live-area').innerHTML = '<p class="text-center text-stone-500 py-16">Could not load live sessions.</p>';
                document.getElementById('live-area').classList.remove('hidden');
            }
        }

        function showError(msg) {
            document.getElementById('error-area').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg || 'Failed to load.';
            lucide.createIcons();
        }

        document.getElementById('search-input').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            const cards = document.querySelectorAll('#folders-area .hover-card');
            cards.forEach(c => {
                const title = c.querySelector('h4')?.textContent?.toLowerCase() || '';
                c.style.display = title.includes(q) ? '' : 'none';
            });
        });

        if (courseId) setTimeout(renderContent, 200);
    </script>
</body>
</html>
