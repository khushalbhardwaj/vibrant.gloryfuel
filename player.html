<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GloryFuel | Player</title>
    <link rel="icon" href="logo.jpg" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #03040a; color: #d6d3d1; -webkit-tap-highlight-color: transparent; }
        .bg-dots { background-image: radial-gradient(rgba(59, 130, 246, 0.15) 1px, transparent 1px); background-size: 30px 30px; }
        .btn-click-effect:active { transform: scale(0.96); }
        .glass-panel { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        :root { --plyr-color-main: #3b82f6; --plyr-video-background: #000; --plyr-video-controls-background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.85)); --plyr-menu-color: #d6d3d1; --plyr-menu-background: rgba(20,20,25,0.95); --plyr-menu-border-color: rgba(255,255,255,0.08); --plyr-menu-radius: 12px; --plyr-tooltip-color: #d6d3d1; --plyr-tooltip-background: rgba(20,20,25,0.95); --plyr-font-family: 'Inter', sans-serif; --plyr-control-icon-size: 18px; --plyr-control-spacing: 12px; --plyr-control-radius: 8px; --plyr-progress-loading-size: 4px; --plyr-range-thumb-height: 14px; --plyr-range-track-height: 5px; }
    </style>
</head>
<body class="min-h-screen selection:bg-blue-500/30 relative overflow-x-hidden flex flex-col">

    <div class="fixed inset-0 pointer-events-none bg-dots opacity-30 z-[-1]"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/15 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>

    <nav class="fixed top-0 w-full z-[60] bg-[#03040a]/80 backdrop-blur-xl border-b border-blue-500/10 h-[60px] sm:h-16 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="text-stone-400 hover:text-white transition-colors btn-click-effect"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <img src="logo.jpg" alt="GloryFuel" class="h-7 sm:h-8 w-auto rounded-full border border-blue-500/20" />
                <span class="text-base sm:text-lg font-black tracking-tighter text-white">GLORY<span class="text-blue-500">FUEL</span></span>
            </div>
            <div id="quality-selector" class="hidden relative">
                <button onclick="toggleQualityMenu()" class="text-xs font-bold text-stone-400 bg-stone-800/80 border border-stone-700 rounded-lg px-3 py-1.5 flex items-center gap-1.5 hover:text-white transition-colors"><i data-lucide="monitor" class="w-3.5 h-3.5"></i> <span id="current-quality">Auto</span></button>
                <div id="quality-menu" class="hidden absolute top-full right-0 mt-1 glass-panel rounded-xl py-1 min-w-[120px] shadow-xl z-[70]">
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-16 sm:pt-20 flex-1 flex flex-col">
        <div id="loading-state" class="flex-1 flex flex-col items-center justify-center px-4">
            <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-sm text-stone-400" id="loading-msg">Loading video...</p>
        </div>

        <div id="player-area" class="hidden flex-1 flex flex-col">
            <div class="relative bg-black w-full max-w-5xl mx-auto" style="aspect-ratio:16/9; max-height:85vh">
                <video id="video-player" class="w-full h-full" playsinline poster=""></video>
            </div>
            <div class="max-w-5xl mx-auto w-full px-4 sm:px-6 py-4">
                <h1 class="text-base sm:text-lg font-bold text-white" id="video-title">Loading...</h1>
                <p class="text-xs text-stone-500 mt-1" id="video-meta"></p>
            </div>
        </div>

        <div id="error-box" class="hidden flex-1 flex flex-col items-center justify-center px-4">
            <div class="w-16 h-16 bg-red-500/10 border border-red-500/20 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="alert-triangle" class="w-8 h-8 text-red-500"></i></div>
            <p class="text-red-400 font-bold text-sm" id="error-msg">Video unavailable.</p>
            <div class="flex gap-3 mt-4" id="error-actions">
                <button onclick="history.back()" class="bg-stone-800 text-stone-300 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:text-white transition-colors border border-stone-700">Go Back</button>
                <button onclick="tryNextQuality()" id="btn-next-quality" class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-blue-500 transition-all btn-click-effect">Next Quality</button>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-blue-500 transition-all btn-click-effect">Retry</button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const API = typeof GLORYFUEL_API !== 'undefined' ? GLORYFUEL_API : "";
        const params = new URLSearchParams(location.search);
        const courseId = params.get('course');
        const videoId = params.get('video');
        const videoTitle = params.get('title') || 'Video';

        document.getElementById('video-title').textContent = videoTitle;
        document.title = 'GloryFuel | ' + videoTitle;

        if (!courseId || !videoId) {
            showError('Missing video parameters.');
        } else {
            loadVideo(courseId, videoId);
        }

        function showError(msg, showNextQuality) {
            const nq = document.getElementById('btn-next-quality');
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('player-area').classList.add('hidden');
            document.getElementById('error-box').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg;
            if (showNextQuality && currentQualityIdx + 1 < qualities.length) {
                nq.classList.remove('hidden');
                nq.textContent = 'Try ' + (qualities[currentQualityIdx + 1]?.label || qualities[currentQualityIdx + 1]?.quality || 'Lower Quality');
            } else {
                nq.classList.add('hidden');
            }
        }

        let hls = null;
        let player = null;
        let qualities = [];
        let currentQualityIdx = 0;

        function buildProxyUrl(rawUrl) {
            return API + '/proxy-video?url=' + encodeURIComponent(rawUrl);
        }

        function destroyPlayer() {
            if (player) { try { player.destroy(); } catch(e) {} player = null; }
            if (hls) { try { hls.destroy(); } catch(e) {} hls = null; }
            const video = document.getElementById('video-player');
            video.removeAttribute('src');
            video.innerHTML = '';
        }

        function initHlsPlayback(url) {
            const video = document.getElementById('video-player');
            if (Hls.isSupported()) {
                hls = new Hls({ enableWorker: false, debug: false });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (!player) {
                        const isMobile = window.innerWidth < 768;
                        player = new Plyr(video, {
                            controls: isMobile
                                ? ['play-large', 'play', 'progress', 'current-time', 'settings', 'fullscreen']
                                : ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                            autoplay: true,
                            keyboard: { focused: true, global: false },
                            tooltips: { controls: true, seek: true },
                            storage: { enabled: false },
                            invertTime: false,
                            displayDuration: true,
                        });
                    }
                    video.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        showError('Video playback error.', true);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    if (!player) {
                        const isMobile = window.innerWidth < 768;
                        player = new Plyr(video, {
                            controls: isMobile
                                ? ['play-large', 'play', 'progress', 'current-time', 'settings', 'fullscreen']
                                : ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                            autoplay: true,
                            keyboard: { focused: true, global: false },
                            tooltips: { controls: true, seek: true },
                            storage: { enabled: false },
                            invertTime: false,
                            displayDuration: true,
                        });
                    }
                    video.play().catch(() => {});
                });
            } else {
                showError('HLS playback not supported in this browser.');
                return false;
            }
            return true;
        }

        async function loadVideo(courseId, videoId) {
            try {
                document.getElementById('loading-msg').textContent = 'Fetching video...';
                const r = await fetch(API + '/api/v1/vibrant/video?video_id=' + videoId + '&course_id=' + courseId);
                const d = await r.json();
                if (!d.success) throw new Error(d.message || 'Video API error');
                if (!d.qualities || d.qualities.length === 0) throw new Error('No playable video URL available.');

                qualities = d.qualities;

                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('player-area').classList.remove('hidden');

                if (d.duration) document.getElementById('video-meta').textContent = d.duration;
                if (d.title) document.getElementById('video-title').textContent = d.title;
                if (d.date) document.getElementById('video-meta').textContent += ' | ' + d.date;
                if (d.thumbnail) document.getElementById('video-player').poster = d.thumbnail;

                setupQualitySelector();
                initHlsPlayback(buildProxyUrl(qualities[0].url));
            } catch (e) {
                showError(e.message || 'Failed to load video.');
            }
        }

        function setupQualitySelector() {
            const qs = document.getElementById('quality-selector');
            const menu = document.getElementById('quality-menu');
            qs.classList.remove('hidden');
            menu.innerHTML = '';
            ['Auto', ...qualities.map(q => q.label || q.quality || q.height || q.url.split('/').pop().split('?')[0])].forEach((label, i) => {
                const btn = document.createElement('button');
                btn.className = 'block w-full text-left px-4 py-3 sm:py-2 text-xs sm:text-[11px] font-medium text-stone-400 hover:text-white hover:bg-stone-800/50 transition-colors first:rounded-t-xl last:rounded-b-xl';
                btn.textContent = label;
                btn.onclick = (e) => { e.stopPropagation(); selectQuality(i === 0 ? null : qualities[i - 1], i === 0 ? -1 : i - 1); };
                menu.appendChild(btn);
            });
        }

        window.toggleQualityMenu = function() {
            document.getElementById('quality-menu').classList.toggle('hidden');
        };

        function selectQuality(q, idx) {
            document.getElementById('quality-menu').classList.add('hidden');
            if (q) {
                currentQualityIdx = idx;
                document.getElementById('current-quality').textContent = q.label || q.quality || q.height || 'Manual';
                destroyPlayer();
                initHlsPlayback(buildProxyUrl(q.url));
            } else {
                currentQualityIdx = -1;
                document.getElementById('current-quality').textContent = 'Auto';
                if (hls) { hls.currentLevel = -1; }
            }
        }

        function tryNextQuality() {
            const nextIdx = currentQualityIdx + 1;
            if (nextIdx < qualities.length) {
                document.getElementById('error-box').classList.add('hidden');
                document.getElementById('loading-state').classList.remove('hidden');
                document.getElementById('loading-msg').textContent = 'Trying ' + (qualities[nextIdx].label || qualities[nextIdx].quality || 'lower quality') + '...';
                selectQuality(qualities[nextIdx], nextIdx);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('player-area').classList.remove('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            const qs = document.getElementById('quality-selector');
            const menu = document.getElementById('quality-menu');
            if (!qs.contains(e.target)) menu.classList.add('hidden');
        });
    </script>
</body>
</html>
