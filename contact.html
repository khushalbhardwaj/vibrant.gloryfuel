<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GloryFuel | Contact</title>
    <link rel="icon" href="logo.jpg" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script><script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #03040a; color: #d6d3d1; -webkit-tap-highlight-color: transparent; }
        .bg-dots { background-image: radial-gradient(rgba(59, 130, 246, 0.15) 1px, transparent 1px); background-size: 30px 30px; }
        .glass-panel { background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-click-effect:active { transform: scale(0.96); }
        .hover-card { background: rgba(28, 25, 30, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hover-card:hover { border-color: rgba(59, 130, 246, 0.4); background: rgba(20, 25, 35, 0.8); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .btn-primary:hover { box-shadow: 0 8px 25px rgba(37,99,235,0.35); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-item { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .pb-safe { padding-bottom: calc(85px + env(safe-area-inset-bottom)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, textarea { font-family: 'Inter', sans-serif; }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
        input:focus, textarea:focus { outline: none; border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    </style>
</head>
<body class="min-h-screen selection:bg-blue-500/30 relative overflow-x-hidden pb-safe md:pb-0">
    <div class="fixed inset-0 pointer-events-none bg-dots opacity-30 z-[-1]"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/15 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-600/15 rounded-full blur-[150px] pointer-events-none z-[-1]"></div>

    <nav class="fixed top-0 w-full z-50 bg-[#03040a]/80 backdrop-blur-xl border-b border-blue-500/10 h-[70px] sm:h-20 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 h-full flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='index.html'" class="text-stone-400 hover:text-white transition-colors btn-click-effect"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <img src="logo.jpg" alt="GloryFuel" class="h-8 sm:h-10 w-auto rounded-full border border-blue-500/20" />
                <span class="text-lg sm:text-xl font-black tracking-tighter text-white">GLORY<span class="text-blue-500">FUEL</span></span>
            </div>
            <div class="items-center gap-2 bg-stone-900/50 p-1.5 rounded-2xl border border-white/5 shadow-inner hidden md:flex">
                <button onclick="window.location.href='index.html'" class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold btn-click-effect text-stone-400 hover:text-white hover:bg-stone-800 uppercase tracking-widest"><i data-lucide="layout-grid" class="w-3.5 h-3.5 inline mr-1"></i> Batches</button>
                <button onclick="window.location.href='about.html'" class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold btn-click-effect text-stone-400 hover:text-white hover:bg-stone-800 uppercase tracking-widest"><i data-lucide="user" class="w-3.5 h-3.5 inline mr-1"></i> About</button>
                <button onclick="window.location.href='contact.html'" class="px-3 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold btn-click-effect text-white bg-blue-600 uppercase tracking-widest shadow-[0_0_15px_rgba(37,99,235,0.4)]"><i data-lucide="headset" class="w-3.5 h-3.5 inline mr-1"></i> Support</button>
            </div>
        </div>
    </nav>

    <main class="pt-28 sm:pt-36 pb-10 px-4 sm:px-6 max-w-xl mx-auto">
        <div class="text-center mb-8 animate-item">
            <div class="inline-flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-4 py-1.5 rounded-full text-blue-400 text-[9px] sm:text-[10px] font-black uppercase tracking-[0.2em] mb-4 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <i data-lucide="headset" class="w-3 h-3"></i> Get in Touch
            </div>
            <h1 class="text-3xl sm:text-5xl font-black text-white mb-3 tracking-tight">Contact <span class="text-blue-500">Us</span></h1>
        </div>

        <div class="glass-panel rounded-2xl p-6 animate-item" style="animation-delay:100ms">
            <form class="space-y-4" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <input type="text" placeholder="Your Name" class="w-full bg-stone-900/80 border border-stone-700 rounded-xl px-4 py-3 text-sm text-white transition-colors">
                <input type="email" placeholder="Your Email" class="w-full bg-stone-900/80 border border-stone-700 rounded-xl px-4 py-3 text-sm text-white transition-colors">
                <textarea rows="4" placeholder="Your Message" class="w-full bg-stone-900/80 border border-stone-700 rounded-xl px-4 py-3 text-sm text-white transition-colors resize-none"></textarea>
                <button type="submit" class="btn-primary w-full text-white py-3 rounded-xl text-xs font-black uppercase tracking-widest btn-click-effect">Send Message</button>
            </form>
            <div class="mt-6 pt-6 border-t border-stone-800 text-center text-xs text-stone-500">
                <p class="flex items-center justify-center gap-2 mb-1"><i data-lucide="mail" class="w-4 h-4 text-blue-400"></i> gloryfuel@support.com</p>
                <p>We reply within 24 hours.</p>
            </div>
        </div>
    </main>

    <div class="md:hidden fixed bottom-0 left-0 w-full bg-[#03040a]/95 backdrop-blur-xl border-t border-stone-800 z-50 flex justify-between items-center px-2 py-3 pb-[calc(12px+env(safe-area-inset-bottom))] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] no-scrollbar">
        <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1.5 text-stone-500 w-[33%] btn-click-effect shrink-0"><i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase tracking-wider">Batches</span></button>
        <button onclick="window.location.href='about.html'" class="flex flex-col items-center gap-1.5 text-stone-500 w-[33%] btn-click-effect shrink-0"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase tracking-wider">About</span></button>
        <button onclick="window.location.href='contact.html'" class="flex flex-col items-center gap-1.5 text-blue-500 w-[33%] btn-click-effect shrink-0"><i data-lucide="headset" class="w-5 h-5"></i><span class="text-[8px] font-bold uppercase tracking-wider">Support</span></button>
    </div>

    <footer class="border-t border-stone-800/50 bg-stone-950/80 py-8 text-center hidden md:block">
        <p class="text-stone-500 text-[9px] uppercase font-bold tracking-[0.2em]">© 2026 GloryFuel</p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
